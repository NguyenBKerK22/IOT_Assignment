[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

build_flags =
  -Iinclude
  -Isrc/hal
  -Isrc/sensor
  -Isrc/service
  -Isrc/task
  -DARDUINOJSON_DECODE_UNICODE=1

lib_deps = bblanchon/ArduinoJson@^6.21.2
    robtillaart/CRC @ ^1.0.3
    vshymanskyy/TinyGSM@^0.12.0
    thingsboard/ThingsBoard
